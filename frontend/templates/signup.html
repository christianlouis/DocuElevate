<!DOCTYPE html>
<html lang="{{ current_locale | default('en') }}">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ _("app.name") }} - {{ _("auth.signup_title") }}</title>
        <link rel="stylesheet" href="/static/styles.css" />
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
              integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
              crossorigin="anonymous"
              referrerpolicy="no-referrer" />
        <script defer
                src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    </head>
    <body class="bg-gray-100 min-h-screen flex items-center justify-center py-8">
        <main class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full" role="main">
            <div class="flex justify-center mb-6">
                <img src="/static/images/logo_writing.svg"
                     alt="{{ _('auth.logo_alt') }}"
                     class="h-16">
            </div>
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">{{ _("auth.signup_heading") }}</h1>
            <p class="text-center text-gray-500 text-sm mb-6">
                {{ _("auth.already_have_account") }}
                <a href="/login" class="text-blue-600 hover:text-blue-500 font-medium">{{ _("auth.sign_in") }}</a>
            </p>
            <div x-data="signupForm">
                <div x-show="error"
                     x-cloak
                     class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded"
                     role="alert"
                     aria-live="polite">
                    <p x-text="error"></p>
                </div>
                <form @submit.prevent="submit" class="space-y-4" novalidate>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">{{ _("auth.email_label") }} <span aria-hidden="true" class="text-red-500">*</span></label>
                        <input type="email"
                               id="email"
                               name="email"
                               required
                               autocomplete="email"
                               x-model="email"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"
                               aria-required="true"
                               style="min-height:44px">
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">{{ _("auth.username_label") }} <span aria-hidden="true" class="text-red-500">*</span></label>
                        <input type="text"
                               id="username"
                               name="username"
                               required
                               autocomplete="username"
                               x-model="username"
                               pattern="^[a-zA-Z0-9_-]+$"
                               minlength="3"
                               maxlength="64"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"
                               aria-required="true"
                               aria-describedby="username-hint"
                               style="min-height:44px">
                        <p id="username-hint" class="mt-1 text-xs text-gray-500">{{ _("auth.signup_username_hint") }}</p>
                    </div>
                    <div>
                        <label for="display_name" class="block text-sm font-medium text-gray-700">{{ _("auth.display_name_label") }} <span class="text-gray-400">{{ _("shared.optional") }}</span></label>
                        <input type="text"
                               id="display_name"
                               name="display_name"
                               autocomplete="name"
                               x-model="display_name"
                               maxlength="255"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"
                               style="min-height:44px">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">{{ _("auth.password_label") }} <span aria-hidden="true" class="text-red-500">*</span></label>
                        <input type="password"
                               id="password"
                               name="password"
                               required
                               autocomplete="new-password"
                               x-model="password"
                               minlength="8"
                               maxlength="128"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"
                               aria-required="true"
                               aria-describedby="password-hint"
                               style="min-height:44px">
                        <p id="password-hint" class="mt-1 text-xs text-gray-500">{{ _("auth.signup_password_hint") }}</p>
                    </div>
                    <div>
                        <label for="password_confirm"
                               class="block text-sm font-medium text-gray-700">{{ _("auth.confirm_password") }} <span aria-hidden="true" class="text-red-500">*</span></label>
                        <input type="password"
                               id="password_confirm"
                               name="password_confirm"
                               required
                               autocomplete="new-password"
                               x-model="password_confirm"
                               minlength="8"
                               maxlength="128"
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"
                               aria-required="true"
                               style="min-height:44px">
                    </div>
                    <button type="submit"
                            :disabled="loading"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50"
                            style="min-height:44px">
                        <span x-show="!loading">{{ _("auth.create_account") }}</span>
                        <span x-show="loading" x-cloak>
                            <i class="fas fa-spinner fa-spin mr-2" aria-hidden="true"></i>{{ _("auth.signup_creating_account") }}
                        </span>
                    </button>
                </form>
            </div>
            <div class="mt-6 text-center">
                <a href="/"
                   class="text-sm font-medium text-blue-600 hover:text-blue-500">{{ _("auth.return_home") }}</a>
            </div>
        </main>
        <div class="fixed bottom-4 text-center w-full text-xs text-gray-500">
            {{ _("app.name") }} {{ app_version|default('', true) }}
        </div>
        <script>
            document.addEventListener('alpine:init', () => {
                Alpine.data('signupForm', () => ({
                    email: '',
                    username: '',
                    display_name: '',
                    password: '',
                    password_confirm: '',
                    loading: false,
                    error: '',
                    i18n: {
                        usernameLength: {{ _('auth.signup_username_length_error') | tojson }},
                        usernameCharacters: {{ _('auth.signup_username_characters_error') | tojson }},
                        passwordsMismatch: {{ _('auth.signup_passwords_mismatch') | tojson }},
                        registrationFailed: {{ _('auth.signup_registration_failed') | tojson }},
                        networkError: {{ _('auth.signup_network_error') | tojson }}
                    },
                    async submit() {
                        this.error = '';
                        if (this.username.length < 3 || this.username.length > 64) {
                            this.error = this.i18n.usernameLength;
                            return;
                        }
                        if (!/^[a-zA-Z0-9_-]+$/.test(this.username)) {
                            this.error = this.i18n.usernameCharacters;
                            return;
                        }
                        if (this.password !== this.password_confirm) {
                            this.error = this.i18n.passwordsMismatch;
                            return;
                        }
                        this.loading = true;
                        try {
                            const resp = await fetch('/api/auth/signup', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-CSRF-Token': '{{ csrf_token }}'
                                },
                                body: JSON.stringify({
                                    email: this.email,
                                    username: this.username,
                                    display_name: this.display_name || null,
                                    password: this.password,
                                    password_confirm: this.password_confirm
                                })
                            });
                            if (resp.ok) {
                                const data = await resp.json();
                                window.location.href = data.email_verification_required
                                    ? '/verify-email-sent'
                                    : '/login?message_key=auth.account_created_success';
                                return;
                            }
                            const data = await resp.json();
                            const detail = data.detail;
                            this.error = Array.isArray(detail)
                                ? detail.map(item => item.msg || String(item)).join(' ') || this.i18n.registrationFailed
                                : detail || this.i18n.registrationFailed;
                        } catch (error) {
                            this.error = this.i18n.networkError;
                        } finally {
                            this.loading = false;
                        }
                    }
                }));
            });
        </script>
    </body>
</html>
