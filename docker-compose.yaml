name: docuelevate

x-docuelevate-service: &docuelevate-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  working_dir: /workdir
  entrypoint: ["/usr/local/bin/docuelevate-compose-entrypoint"]
  env_file:
    - path: .env
      required: false
  environment: &docuelevate-environment
    PYTHONPATH: /app
    WORKDIR: /workdir
    REDIS_URL: redis://redis:6379/0
    GOTENBERG_URL: http://gotenberg:3000
    MEILISEARCH_URL: http://meilisearch:7700
    MEILISEARCH_INDEX_NAME: documents
    ENABLE_SEARCH: "true"
    VECTOR_INDEX_ENABLED: "true"
    VECTOR_INDEX_URL: http://qdrant:6333
    VECTOR_INDEX_COLLECTION: docuelevate_documents
    AUTH_ENABLED: "true"
    MULTI_USER_ENABLED: "true"
    ALLOW_LOCAL_SIGNUP: "true"
    UNOWNED_DOCS_VISIBLE_TO_ALL: "false"
    EXTERNAL_HOSTNAME: localhost:8000
    PUBLIC_BASE_URL: http://localhost:8000
  volumes:
    - ${DOCUELEVATE_WORKDIR:-/var/docparse/workdir}:/workdir
    - bootstrap-secrets:/run/docuelevate-bootstrap:ro

services:
  bootstrap:
    image: alpine:3.22
    restart: "no"
    network_mode: none
    command:
      - /bin/sh
      - -ec
      - |
        umask 077
        if [ ! -s /bootstrap/session_secret ]; then
          head -c 48 /dev/urandom | base64 > /bootstrap/session_secret
        fi
        if [ ! -s /bootstrap/postgres_password ]; then
          head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n' > /bootstrap/postgres_password
        fi
    volumes:
      - bootstrap-secrets:/bootstrap

  postgres:
    image: postgres:17
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: docuelevate
      POSTGRES_USER: docuelevate
      POSTGRES_PASSWORD_FILE: /run/docuelevate-bootstrap/postgres_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuelevate -d docuelevate"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - bootstrap-secrets:/run/docuelevate-bootstrap:ro

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.36.0
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch-data:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    <<: *docuelevate-service
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*"]
    ports:
      - "8000:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
      meilisearch:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/diagnostic/healthz/ready', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  worker:
    <<: *docuelevate-service
    command: ["celery", "-A", "app.celery_worker", "worker", "--loglevel=info", "-Q", "document_processor,default,celery"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
      api:
        condition: service_healthy

  beat:
    <<: *docuelevate-service
    command: ["celery", "-A", "app.celery_worker", "beat", "--loglevel=info"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  knowledge-research-worker:
    <<: *docuelevate-service
    command: ["celery", "-A", "app.celery_worker", "worker", "--loglevel=info", "--concurrency=1", "-Q", "knowledge_research"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      qdrant:
        condition: service_started
      api:
        condition: service_healthy

  search-index-worker:
    <<: *docuelevate-service
    command: ["celery", "-A", "app.celery_worker", "worker", "--loglevel=info", "--concurrency=1", "-Q", "search_index"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      api:
        condition: service_healthy

  docs:
    image: squidfunk/mkdocs-material:latest
    restart: "no"
    profiles: [docs]
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml
    working_dir: /docs
    command: ["serve", "--dev-addr=0.0.0.0:8000", "--config-file=/docs/mkdocs.yml"]
    ports:
      - "8001:8000"

volumes:
  bootstrap-secrets:
  postgres-data:
  meilisearch-data:
  qdrant-data:
