name: Build and submit

on:
  push:
    branches:
      - main
    paths:
      - mobile/**

jobs:
  build_android:
    name: Build Android app
    type: build
    env:
      # Suppress Node.js url.parse() deprecation warnings ([DEP0169]) emitted by
      # EAS CLI when running on the build image's system Node 22+.
      NODE_NO_WARNINGS: "1"
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS app
    type: build
    env:
      # Suppress Node.js url.parse() deprecation warnings ([DEP0169]) emitted by
      # EAS CLI when running on the build image's system Node 22+.
      NODE_NO_WARNINGS: "1"
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit iOS to App Store Connect
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
